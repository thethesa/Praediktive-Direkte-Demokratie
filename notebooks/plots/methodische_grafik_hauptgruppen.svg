<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 527" width="1200" height="527">
  <defs>
    <style>
      .saeule { fill: none; stroke: #E67E22; stroke-width: 2; }
      .label { font-family: sans-serif; font-size: 12px; fill: #2C3E50; text-anchor: middle; }
      .green-rect { fill: none; stroke: #27AE60; stroke-width: 4; }
      .violet-circle { fill: #8E44AD; fill-opacity: 0.8; }
      .legend-text { font-family: sans-serif; font-size: 11px; fill: #2C3E50; }
    </style>
  </defs>
  
  <rect width="1200" height="527" fill="#FAFAFA"/>
  
  <!-- 12 Saulen, symmetrischer Abstand links/rechts -->
  <rect x="35" y="20" width="85" height="360" class="saeule"/>
  <rect x="35" y="20" width="85" height="360" fill="none" stroke="#27AE60" stroke-width="4"/>
  <text x="77.5" y="210" class="label" transform="rotate(-90, 77.5, 210)">Staatsordnung</text>
  
  <rect x="130" y="20" width="85" height="360" class="saeule"/>
  <circle cx="172.5" cy="55" r="18" class="violet-circle"/>
  <text x="172.5" y="210" class="label" transform="rotate(-90, 172.5, 210)">Aussenpolitik</text>
  
  <rect x="225" y="20" width="85" height="360" class="saeule"/>
  <text x="267.5" y="210" class="label" transform="rotate(-90, 267.5, 210)">Sicherheitspolitik</text>
  
  <rect x="320" y="20" width="85" height="360" class="saeule"/>
  <rect x="320" y="260" width="85" height="120" class="green-rect"/>
  <text x="362.5" y="210" class="label" transform="rotate(-90, 362.5, 210)">Wirtschaft</text>
  
  <rect x="415" y="20" width="85" height="360" class="saeule"/>
  <text x="457.5" y="210" class="label" transform="rotate(-90, 457.5, 210)">Landwirtschaft</text>
  
  <rect x="510" y="20" width="85" height="360" class="saeule"/>
  <text x="552.5" y="210" class="label" transform="rotate(-90, 552.5, 210)">&#214;ff. Finanzen</text>
  
  <rect x="605" y="20" width="85" height="360" class="saeule"/>
  <text x="647.5" y="210" class="label" transform="rotate(-90, 647.5, 210)">Energie</text>
  
  <rect x="700" y="20" width="85" height="360" class="saeule"/>
  <text x="742.5" y="210" class="label" transform="rotate(-90, 742.5, 210)">Verkehr &amp; Infra</text>
  
  <rect x="795" y="20" width="85" height="360" class="saeule"/>
  <text x="837.5" y="210" class="label" transform="rotate(-90, 837.5, 210)">Umwelt &amp; Lebensraum</text>
  
  <rect x="890" y="20" width="85" height="360" class="saeule"/>
  <circle cx="932.5" cy="350" r="18" class="violet-circle"/>
  <text x="932.5" y="210" class="label" transform="rotate(-90, 932.5, 210)">Sozial- &amp; Gesellschaftspolitik</text>
  
  <rect x="985" y="20" width="85" height="360" class="saeule"/>
  <text x="1027.5" y="210" class="label" transform="rotate(-90, 1027.5, 210)">Bildung &amp; Forschung</text>
  
  <rect x="1080" y="20" width="85" height="360" class="saeule"/>
  <text x="1122.5" y="210" class="label" transform="rotate(-90, 1122.5, 210)">Kultur, Religion, Medien</text>
  
  <!-- Violettes Rechteck unten -->
  <rect x="18" y="355" width="1164" height="45" fill="white" fill-opacity="0.3" stroke="#8E44AD" stroke-width="4"/>
  
  <!-- Blaues Rechteck: Abstand 10 wie zwischen Saulen, gleiche Linienstarke, nicht gefullt -->
  <rect x="18" y="410" width="1164" height="45" fill="none" stroke="#2980B9" stroke-width="4"/>
  
  <!-- Legende -->
  <rect x="20" y="470" width="14" height="14" fill="none" stroke="#E67E22" stroke-width="2"/>
  <text x="42" y="482" class="legend-text">12 Hauptgruppen im Datensatz</text>
  
  <rect x="20" y="495" width="14" height="14" fill="white" fill-opacity="0.3" stroke="#8E44AD" stroke-width="2"/>
  <text x="42" y="507" class="legend-text">Horizontale Recherche, punktueller Deep Dive</text>
  
  <rect x="280" y="470" width="14" height="14" fill="none" stroke="#27AE60" stroke-width="2"/>
  <text x="302" y="482" class="legend-text">Aus Daten abgeleitete thematische Schwerpunkte</text>
  
  <rect x="280" y="495" width="14" height="14" fill="none" stroke="#2980B9" stroke-width="2"/>
  <text x="302" y="507" class="legend-text">Thematische Grundlagen</text>
</svg>
